kind = "web"
previewPath = "/"
title = "Luxe Furniture Store"
version = "1.0.0"
id = "artifacts/furniture-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23155
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/furniture-store run dev"

[services.env]
PORT = "23155"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/furniture-store", "run", "build"]
publicDir = "artifacts/furniture-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
